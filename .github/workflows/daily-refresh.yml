name: Daily data refresh

# Runs on GitHub's servers - works even when your computer is off.
# Refreshes the mayor's-race odds (Kalshi) and the happy-hour sheet snapshot,
# then commits + pushes, which triggers Netlify to redeploy automatically.
on:
  schedule:
    # GitHub often delays scheduled runs, sometimes by hours, so we ask twice.
    # The refresh script is idempotent, so a duplicate run is harmless.
    - cron: '2 12 * * *'  # 12:02 UTC = ~7:02 AM Central (shifts 1h with daylight saving)
    - cron: '32 12 * * *' # 12:32 UTC = ~7:32 AM Central
  workflow_dispatch: {}    # lets you also run it on demand from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh public data (Kalshi odds + happy-hour sheet)
        run: node scripts/refresh-data.mjs

      - name: Install news-refresh dependencies
        run: npm install --no-save imapflow mailparser

      - name: Refresh news from Gmail newsletters + rotate spotlight
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/refresh-news.mjs

      - name: Commit and push if anything changed
        run: |
          git config user.name "34thward-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Automated daily data refresh ($(date -u +%Y-%m-%d))"
            git push
            echo "Pushed refreshed data."
          else
            echo "No changes to commit."
          fi
